name: Terraform CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  terraform:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug workspace
        shell: powershell
        run: |
          Write-Host "GITHUB_WORKSPACE = $env:GITHUB_WORKSPACE"
          Get-ChildItem $env:GITHUB_WORKSPACE
          Get-ChildItem "$env:GITHUB_WORKSPACE\env"
          Get-ChildItem "$env:GITHUB_WORKSPACE\env\dev"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        shell: powershell
        working-directory: ${{ github.workspace }}/env/dev
        run: terraform init

      - name: Terraform Format Check
        shell: powershell
        working-directory: ${{ github.workspace }}/env/dev
        run: terraform fmt -check

      - name: Terraform Validate
        shell: powershell
        working-directory: ${{ github.workspace }}/env/dev
        run: terraform validate

      - name: Terraform Plan
        shell: powershell
        working-directory: ${{ github.workspace }}/env/dev
        run: terraform plan
