name: Terraform Destroy

on:
  workflow_dispatch:

jobs:
  terraform-destroy:
    runs-on: self-hosted

    env:
      TF_VAR_db_username: ${{ secrets.TF_VAR_db_username }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        shell: powershell
        run: terraform -chdir=env/dev init -reconfigure -input=false

      - name: Terraform Destroy
        shell: powershell
        run: terraform -chdir=env/dev destroy -input=false -auto-approve

      - name: Terraform State List After Destroy
        shell: powershell
        run: terraform -chdir=env/dev state list