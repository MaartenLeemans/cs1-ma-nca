name: Terraform Destroy

on:
  workflow_dispatch:

jobs:
  terraform-destroy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        shell: powershell
        working-directory: ${{ github.workspace }}/env/dev
        run: terraform init

      - name: Terraform Destroy
        shell: powershell
        working-directory: ${{ github.workspace }}/env/dev
        run: terraform destroy -auto-approve
